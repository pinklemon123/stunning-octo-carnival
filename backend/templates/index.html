<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphMind AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:,">
    </head>
<body>
    <div class="topbar">
        <div class="brand"><i class="fa-solid fa-circle-nodes"></i> GraphMind</div>
        <div class="topbar-search"><input type="text" id="global-search" placeholder="Search nodes..." /></div>
        <div class="topbar-actions">
            <button onclick="toggleDetailPanel()" title="Toggle Details"><i class="fa-solid fa-columns"></i></button>
            <button onclick="refreshGraph()" title="Refresh Graph"><i class="fa-solid fa-rotate-right"></i></button>
            <button onclick="triggerFileSelect()" title="Upload"><i class="fa-solid fa-upload"></i></button>
            <a href="/query" title="Cypher Query"><i class="fa-solid fa-terminal"></i></a>
            <a href="/review" title="Review"><i class="fa-solid fa-clipboard-check"></i></a>
            <a href="/files" title="Files"><i class="fa-solid fa-folder-open"></i></a>
        </div>
    </div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Search</div>
                <input type="text" id="search-input" placeholder="Search node..." />
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Filter</div>
                <input type="number" id="min-conf" placeholder="Min confidence 0-1" step="0.05">
                <select id="source-filter"><option value="">All Sources</option></select>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Path</div>
                <input type="text" id="sp-source" placeholder="source">
                <input type="text" id="sp-target" placeholder="target">
                <button onclick="shortestPath()">Find</button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Import</div>
                <input type="text" id="url-input" placeholder="Import from URL">
                <button onclick="processUrl()">Go</button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Export</div>
                <input id="export-seed" placeholder="Seed">
                <input id="export-depth" type="number" value="1">
                <select id="export-format"><option value="json">JSON</option><option value="csv">CSV</option><option value="graphml">GraphML</option></select>
                <button onclick="exportSubgraph()">Export</button>
            </div>
        </aside>

        <main class="graph-area">
            <div class="graph-toolbar">
                <button onclick="applyLayout('fcose')" title="Auto Layout"><i class="fa-solid fa-sitemap"></i></button>
                <button onclick="cy.fit()" title="Fit"><i class="fa-solid fa-expand"></i></button>
                <button onclick="cy.zoom(cy.zoom() * 1.2)" title="Zoom in"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                <button onclick="cy.zoom(cy.zoom() / 1.2)" title="Zoom out"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                <button onclick="clearGraph()" class="danger"><i class="fa-solid fa-trash"></i></button>
            </div>

            <div id="cy"></div>
            <!-- Slide-in detail panel inside graph area -->
            <aside class="detail-panel" id="detail-panel">
                <div class="detail-header">
                    <span id="detail-title">Node Details</span>
                    <button onclick="closeDetailPanel()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="detail-content">
                    <div class="detail-section"><div class="detail-subtitle">Attributes</div><div id="detail-attrs"></div></div>
                    <div class="detail-section"><div class="detail-subtitle">Outgoing Relations</div><div id="detail-out"></div></div>
                    <div class="detail-section"><div class="detail-subtitle">Incoming Relations</div><div id="detail-in"></div></div>
                    <div class="detail-section"><div class="detail-subtitle">Actions</div>
                        <button onclick="highlightNeighborhood()">Highlight Neighborhood</button>
                        <button onclick="deleteSelectedNode()" class="danger">Delete Node</button>
                    </div>
                </div>
            </aside>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <h3>Drop files here</h3>
                </div>
            </div>
        </main>
        
    </div>

    <input type="file" id="file-upload" multiple style="display:none" onchange="uploadFile()">
    <div id="loading" class="loading">Loading...</div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
